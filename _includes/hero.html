<section class="usa-hero height-mobile" style="background-image: url(/images/{{ include.hero-img | asset_url }});">
  {% if include.hero-text %}
  <div class="grid-container">  
    <div class="usa-hero__callout bg-black opacity-80 center text-center maxw-mobile">
      <h3 class="usa-hero__heading opacity-100"><em class="usa-hero__heading--alt">{{ include.hero-text }}</em>
      </h3>
    </div>
  </div>
  {% endif %}
</section>
